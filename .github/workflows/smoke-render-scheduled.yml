# Periodic production API smoke. Complements deploy.yml smoke-render after each main push.
# Optional: SMOKE_BASE_URL or RENDER_URL; SMOKE_EMAIL + SMOKE_PASSWORD for authenticated checks.
name: Smoke Render (scheduled)

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours UTC
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
      SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
      SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Remote smoke (Render)
        run: npm run smoke:render
