name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smc_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/smc_test?schema=public
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars
      ENCRYPTION_KEY: ci-encryption-key-at-least-32-characters
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Install dependencies (API)
        run: npm ci

      - name: Install dependencies (dashboard)
        run: npm ci --prefix dashboard

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Test API (Vitest)
        run: npm test

      - name: Lint API (TypeScript)
        run: npm run lint

      - name: Build dashboard
        run: npm run dashboard:build
