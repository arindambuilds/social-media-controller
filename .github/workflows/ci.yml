# PRs to main: lint, tests, pre-deploy check. Push to main is handled by deploy.yml (avoid duplicate runs).
name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        env: 
          DATBASE_URL: postgresql://test:test@localhost:5432/testdb

      - name: Prisma migrate
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb

      - run: npm run lint

      - run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          NODE_ENV: test

      - name: Pre-deploy check
        run: node scripts/pre-deploy-check.mjs
        env:
          NODE_ENV: production
          PORT: "4000"
          APP_BASE_URL: http://localhost:4000
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: replace-with-a-long-random-secret-at-least-32-characters
          JWT_REFRESH_SECRET: replace-with-another-long-random-secret-32-chars-min
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          AUTH_HTTPONLY_COOKIES: "false"
          ENCRYPTION_KEY: replace-with-a-32-byte-secret-value-min-32
          OAUTH_REDIRECT_BASE_URL: http://localhost:4000
          INSTAGRAM_REDIRECT_URI: http://localhost:4000/api/auth/oauth/instagram/callback
          INSTAGRAM_FRONTEND_REDIRECT_URI: http://localhost:3000/onboarding/callback
          INGESTION_MODE: mock
          OPENAI_MODEL: gpt-4o
          CORS_ORIGIN: "*"
          INSTAGRAM_MOCK_MODE: "true"
          EMAIL_FROM_ADDRESS: noreply@pulseos.in
          EMAIL_FROM_NAME: PulseOS
          DASHBOARD_URL: http://localhost:3000
          WA_API_VERSION: v19.0
          QUADRAPILOT_OUTPUT_DIR: quadrapilot/output
          QUADRAPILOT_PROJECT_NAME: PulseOS
          QUADRAPILOT_STACK: Node.js/TypeScript/BullMQ/Prisma/Supabase
          QUADRAPILOT_LOCKED_FILES: pdfQueueObservability.ts,pdfQueueMetricsFlush.ts
