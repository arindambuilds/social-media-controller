# Push to main: migrate, seed, tests, API + dashboard lint, Render deploy hook, smoke.
# Set GitHub secret RENDER_DEPLOY_HOOK_URL (preferred) or RENDER_DEPLOY_HOOK (legacy) to your Render Deploy Hook URL.
# Postgres + Prisma here are required: `env.ts` and Vitest load at import time with DATABASE_URL.
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: # Actions → CI/CD Pipeline → Run workflow

jobs:
  test-lint-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smc_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/smc_test?schema=public
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars
      ENCRYPTION_KEY: ci-encryption-key-at-least-32-characters
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Run tests
        run: npm test

      - name: Run API lint
        run: npm run lint

      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard

      - name: Run dashboard lint
        run: npm --prefix dashboard run lint

      - name: Pre-deploy check
        run: node scripts/pre-deploy-check.mjs

      - name: Deploy to Render
        if: success()
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          HOOK="${RENDER_DEPLOY_HOOK_URL:-}"
          if [ -z "$HOOK" ]; then HOOK="${RENDER_DEPLOY_HOOK:-}"; fi
          if [ -z "$HOOK" ]; then
            echo "Neither RENDER_DEPLOY_HOOK_URL nor RENDER_DEPLOY_HOOK set — skipping deploy."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"

  smoke-render:
    needs: [test-lint-deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    env:
      RENDER_URL: ${{ secrets.RENDER_URL }}
      SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
      SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install API dependencies
        run: npm ci
      # Smoke: GET /api/health, GET /api/, optional login + GET /api/notifications — scripts/smoke-demo.ts
      - name: Remote smoke (Render)
        run: npm run smoke:render
