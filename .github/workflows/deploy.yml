# Push to main: API tests + lints + dashboard lint, then Render deploy hook (if secret set).
# Postgres + Prisma here are required: `env.ts` and Vitest load at import time with DATABASE_URL.
name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test-lint-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smc_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/smc_test?schema=public
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars
      ENCRYPTION_KEY: ci-encryption-key-at-least-32-characters
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Run tests
        run: npm test

      - name: Run API lint
        run: npm run lint

      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard

      - name: Run dashboard lint
        run: npm --prefix dashboard run lint

      - name: Deploy to Render
        if: success()
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skipping deploy (GitHub → Settings → Secrets)."
            exit 0
          fi
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK}"

  smoke-render:
    needs: [test-lint-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install API dependencies
        run: npm ci
      # Smoke test: 7/7 checks (Health, Login, Analytics, AI Insights, Leads, Gov preview, Posts) — scripts/smoke-demo.ts
      - name: Remote smoke (Render)
        run: npm run smoke:render
