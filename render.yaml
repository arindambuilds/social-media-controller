# Render Blueprint — API + WhatsApp BullMQ workers (set env vars in dashboard; do not commit secrets).
# Service name must match the Render dashboard exactly to avoid Blueprint sync creating a duplicate service.
# Web: Prisma generate at build; migrate on start.
# If you use an external DB (e.g. Supabase) instead of the Render Postgres below, remove `fromDatabase` for
# DATABASE_URL / DIRECT_URL and set both in the Render dashboard (sync: false).
services:
  - type: web
    name: social-media-controller
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: social-media-controller-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: social-media-controller-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WA_APP_SECRET
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false

  - type: worker
    name: pulse-whatsapp-ingress-worker
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/workers/whatsappIngressWorkerEntry.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WA_APP_SECRET
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false

  - type: worker
    name: pulse-whatsapp-outbound-worker
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/workers/whatsappOutboundWorkerEntry.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WA_APP_SECRET
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false

databases:
  - name: social-media-controller-db
    plan: free
    region: oregon
