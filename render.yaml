# Render Blueprint — API + WhatsApp BullMQ workers.
# DATABASE_URL / DIRECT_URL: set in the Render dashboard (sync: false). Do not use fromDatabase here
# unless this service uses Render Postgres — external DBs (e.g. Supabase, Neon, other hosts) must be
# dashboard-managed only, or Blueprint sync will fail when resolving fromDatabase.
# Service name must match the Render dashboard exactly to avoid Blueprint sync creating a duplicate service.
# Web: Prisma generate at build; migrate on start.
services:
  - type: web
    name: social-media-controller
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH_HTTPONLY_COOKIES
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WA_APP_SECRET
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false

  - type: worker
    name: pulse-whatsapp-ingress-worker
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/workers/whatsappIngressWorkerEntry.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH_HTTPONLY_COOKIES
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WA_APP_SECRET
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false

  - type: worker
    name: pulse-whatsapp-outbound-worker
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/workers/whatsappOutboundWorkerEntry.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH_HTTPONLY_COOKIES
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WA_APP_SECRET
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false
