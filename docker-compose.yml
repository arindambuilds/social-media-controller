services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: social_media_controller
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
